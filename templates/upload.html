<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload File | Cyber Threat Detector</title>
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background-color: #f8f9fa;
      padding-top: 60px;
    }
    .container {
      max-width: 800px;
    }
    .prediction-box {
      margin-top: 20px;
      padding: 20px;
      background-color: #ffffff;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    .navbar-brand span {
      font-weight: 600;
      font-size: 1.5rem;
    }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
  <a class="navbar-brand d-flex align-items-center" href="/">
    <img src="{{ url_for('static', filename='cyber_logo.png') }}" alt="Logo" style="height: 40px; margin-right: 10px;">
    <span>Threat Detector</span>
  </a>
  <div class="ml-auto">
    <a href="/about" class="btn btn-outline-light">About</a>
  </div>
</nav>

<div class="container mt-5">
  <h2 class="mb-4">Upload a File for Analysis</h2>

  <form method="POST" enctype="multipart/form-data">
    <div class="form-group">
      <input type="file" name="file" class="form-control-file" required>
    </div>
    <button type="submit" class="btn btn-primary">Analyze File</button>
  </form>

  {% if extracted_text %}
  <div class="prediction-box mt-4">
    <h5><strong>Extracted Text:</strong></h5>
    <p>{{ extracted_text }}</p>
    <hr>
    <h5><strong>Prediction:</strong></h5>
    <p>{{ prediction }}</p>
  </div>
  {% endif %}
</div>

</body>
</html>
